<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Karim - القرآن الكريم  </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #10b981; }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: #05080f; 
            color: white;
            transition: background 0.4s ease, color 0.4s ease;
            margin: 0;
            overflow-x: hidden;
        }
        body.light-mode { background: #f8fafc; color: #1e293b; }
        .font-quran { font-family: 'Amiri', serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .surah-active {
            background: var(--primary-color) !important;
            color: black !important;
            box-shadow: 0 10px 30px -10px var(--primary-color);
        }

        #settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 45; }
        .main-container { padding-top: 80px; padding-bottom: 180px; }

        .quran-logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 30px var(--primary-color);
        }

        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 12s linear infinite; }
        
        /* ستايل أزرار Sleep Timer */
        .timer-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 12px;
            font-size: 11px;
            transition: 0.3s;
        }
        .timer-btn:hover { background: var(--primary-color); color: black; }
    </style>
</head>
<body class="min-h-screen">

    <div class="fixed top-0 left-0 right-0 z-[60] bg-emerald-500/10 backdrop-blur-md py-2 text-center border-b border-white/5">
        <p id="zekr-display" class="text-xs sm:text-sm font-bold text-emerald-400 transition-all duration-1000 opacity-0 italic">جاري التحميل...</p>
    </div>

    <div id="splash-screen" class="fixed inset-0 z-[100] bg-[#05080f] flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="relative mb-6">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQpecx7EXgjoeaK9N6bXQEkkpsX65NDnHionMGYyk94lg&s=10" alt="Quran" class="quran-logo animate-pulse">
        </div>
        <h1 class="text-4xl font-bold font-quran text-white tracking-widest">القرآن الكريم </h1>
        <p class="text-emerald-500 mt-2 text-sm opacity-60">تطوير يوسف بوعنيقة</p>
    </div>

    <div id="settings-overlay" onclick="toggleSettings()"></div>
    <div class="fixed top-14 left-6 z-40 flex gap-2">
      <button onclick="toggleSettings()" class="p-3 glass-card rounded-full shadow-xl">
  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
  </svg>
</button>
<button onclick="showFavorites()" class="px-4 py-2 glass-card rounded-full font-bold text-xs text-red-500">المفضلة</button>
        <button onclick="showAbout()" class="px-4 py-2 glass-card rounded-full font-bold text-xs">حول</button>
    </div>

    <div id="settings-panel" class="fixed inset-y-0 left-0 w-72 glass-card z-50 p-6 translate-x-[-100%] transition-transform duration-500 shadow-2xl overflow-y-auto">
        <h2 class="text-xl font-bold mb-8">الإعدادات</h2>
        
        <div class="space-y-8">
            <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl">
                <span>الوضع الليلي</span>
                <button onclick="toggleDarkMode()" class="w-10 h-5 bg-emerald-500/20 rounded-full relative">
                    <div id="switch-circle" class="absolute left-1 top-1 w-3 h-3 bg-emerald-500 rounded-full transition-transform"></div>
                </button>
            </div>

            <div>
                <label class="text-[10px] text-slate-500 block mb-3 uppercase tracking-wider">لون التطبيق</label>
                <div id="theme-colors" class="grid grid-cols-4 gap-3"></div>
            </div>

            <div class="p-4 bg-white/5 rounded-2xl">
                <label class="text-[10px] text-slate-500 block mb-3 uppercase tracking-wider">مؤقت النوم (إيقاف تلقائي)</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setSleepTimer(15)" class="timer-btn">15 دقيقة</button>
                    <button onclick="setSleepTimer(30)" class="timer-btn">30 دقيقة</button>
                    <button onclick="setSleepTimer(60)" class="timer-btn">ساعة</button>
                    <button onclick="setSleepTimer(0)" class="timer-btn text-red-400">إيقاف</button>
                </div>
                
                
                
                
            </div>
            
            <button onclick="showHijriCalendar()" class="timer-btn w-full p-4 rounded-2xl bg-white/5 text-right flex items-center gap-4 transition">
    <span>📅</span> التقويم الهجري
</button>

            
            
        </div>
    </div>

    <div id="main-content" class="main-container max-w-6xl mx-auto px-6">
        <div id="reciters-view" class="space-y-8">
            <header class="text-center mb-8">
                <h1 class="text-5xl font-extrabold mb-4 bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent">نخبة القراء</h1>
                <div id="prayer-times" class="max-w-xl mx-auto glass-card p-4 rounded-2xl flex justify-around items-center text-[10px] sm:text-xs">
                    <span class="animate-pulse text-slate-500 italic">جاري جلب مواقيت الصلاة لمدينتك...</span>
                </div>
            </header>
            <div id="reciters-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div id="surahs-view" class="hidden space-y-8">
            <div class="flex items-center justify-between glass-card p-6 rounded-3xl sticky top-14 z-10 shadow-xl">
                <button onclick="showReciters()" class="p-3 bg-white/5 rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                </button>
                <div class="text-center truncate mx-4">
                    <h2 id="current-name" class="text-2xl font-bold truncate"></h2>
                    <p class="text-emerald-400 text-sm font-quran">اختر سورة مباركة</p>
                </div>
                <img id="current-img" class="w-16 h-16 rounded-2xl object-cover" src="">
            </div>
            <div id="surahs-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </div>
    </div>

    <div id="player-bar" class="fixed bottom-0 left-0 right-0 p-6 z-[60] translate-y-full transition-all duration-700">
        <div id="player-inner" class="max-w-4xl mx-auto glass-card rounded-[2.5rem] p-5 shadow-2xl relative border-t border-white/10">
            <button onclick="closePlayer()" class="absolute -top-3 -right-3 w-8 h-8 bg-red-500 text-white rounded-full flex items-center justify-center">✕</button>
            <div class="px-4 mb-4">
                <input type="range" id="progress-bar" value="0" class="w-full h-1.5 bg-white/10 rounded-full accent-emerald-500 cursor-pointer">
                <div class="flex justify-between text-[10px] text-slate-500 mt-2">
                    <span id="current-time">00:00</span>
                    <span id="duration">00:00</span>
                </div>
            </div>
            <div class="flex items-center justify-between gap-4">
                <div class="flex items-center gap-4 flex-1 truncate">
                    <img id="p-img" class="w-14 h-14 rounded-2xl object-cover" src="">
                    <div class="truncate">
                        <h4 id="p-surah" class="font-bold text-emerald-400 text-lg font-quran truncate"></h4>
                        <p id="p-reciter" class="text-xs text-slate-500 truncate"></p>
                    </div>
                </div>
                <audio id="main-audio"></audio>
                <button id="play-btn" class="w-14 h-14 bg-emerald-500 rounded-full flex items-center justify-center shadow-xl">
                    <svg id="play-svg" class="w-8 h-8 text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-svg" class="w-8 h-8 text-black hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="data/ajm.js"></script>
    <script src="data/gmd.js"></script>
    
     <script src="data/bst.js"></script>
    <script src="data/shrm.js"></script>
   
    
    <script src="data/reciters.js"></script>
    <script src="app.js"></script>
</body>
</html>
